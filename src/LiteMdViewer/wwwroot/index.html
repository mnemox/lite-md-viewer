<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lite MD Viewer</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="stylesheet" href="/vendor/highlight-github.min.css" id="hljs-light" />
  <link rel="stylesheet" href="/vendor/highlight-github-dark.min.css" id="hljs-dark" />
  <link rel="stylesheet" href="/css/style.css" />

  <script>
    // Set theme early to avoid a flash of the wrong colors.
    (function () {
      try {
        var t = localStorage.getItem('mdm-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        var l = document.getElementById('hljs-light'), d = document.getElementById('hljs-dark');
        if (l) l.disabled = (t === 'dark');
        if (d) d.disabled = (t !== 'dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="topbar">
    <div class="bar-left">
      <button id="menuBtn" class="icon-btn" aria-label="Toggle menu" aria-expanded="false"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span id="fileTitle" class="file-title" dir="auto"></span>
      <span id="fileStatus" class="badge"></span>
    </div>
    <div class="bar-center">
      <div class="seg" role="tablist">
        <button id="viewModeBtn" class="seg-btn active" role="tab">View</button>
        <button id="editModeBtn" class="seg-btn" role="tab">Edit</button>
      </div>
      <button id="detailsBtn" class="btn" title="File details">Details</button>
      <button id="relationsBtn" class="btn" title="Document relations">Relations</button>
    </div>
    <div class="bar-right">
      <button id="saveBtn" class="btn primary hidden">Save</button>
      <button id="themeBtn" class="icon-btn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <!-- left-edge hover hot-zone that opens the drawer -->
  <div id="edgeZone" class="edge-zone" aria-hidden="true"></div>

  <aside id="drawer" class="drawer" aria-hidden="true" aria-label="Managed files">
    <div class="drawer-head">
      <button id="newFileBtn" class="btn primary" title="Create a new Markdown file">+ New file</button>
      <button id="addFileBtn" class="btn" title="Add an existing file from disk">Add file</button>
      <button id="addFolderBtn" class="btn" title="New folder">New folder</button>
      <button id="drawerCloseBtn" class="icon-btn" title="Close menu" aria-label="Close menu">✕</button>
    </div>
    <nav id="tree" class="tree" aria-label="File tree"></nav>
  </aside>
  <div id="scrim" class="scrim" hidden></div>

  <main class="main">
    <div class="content">
      <div id="loading" class="loading hidden" role="status" aria-label="Loading"><span class="spinner" aria-hidden="true"></span></div>

      <section id="welcome" class="welcome">
        <h1>Lite MD Viewer</h1>
        <p>View and edit Markdown files (including Mermaid diagrams).</p>
        <button class="btn primary" id="welcomeAdd">+ Add a file</button>
      </section>

      <article id="viewer" class="viewer markdown-body hidden" dir="auto"></article>

      <div id="editor" class="editor hidden">
        <textarea id="editorText" class="editor-text" spellcheck="false" dir="auto"
                  aria-label="Markdown source"></textarea>
        <article id="editorPreview" class="viewer markdown-body editor-preview" dir="auto"></article>
      </div>
    </div>
  </main>

  <!-- Add-file browser modal -->
  <div id="browseModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Add a Markdown file">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="browseTitle">Add a Markdown file</strong>
        <button class="icon-btn" id="browseClose" aria-label="Close">✕</button>
      </div>
      <div class="browse-bar">
        <button class="btn" id="browseUp" title="Up one level">↑</button>
        <span id="browseCrumb" class="crumb" dir="auto"></span>
      </div>
      <input id="browseFilter" class="input" placeholder="Filter this folder…" />
      <ul id="browseList" class="browse-list"></ul>
      <div class="modal-foot">
        <input id="browsePath" class="input grow" placeholder="…or paste a full path to a .md file" dir="auto" />
        <button class="btn primary" id="browseAddPath">Add</button>
      </div>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <!-- Vendored libraries (offline; no CDN at runtime) -->
  <script src="/vendor/markdown-it.min.js"></script>
  <script src="/vendor/highlight.min.js"></script>
  <script src="/vendor/purify.min.js"></script>
  <script src="/vendor/mermaid.min.js"></script>
  <script src="/vendor/three.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
